name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "docker-compose.prod.yml"
      - "infra/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "docker-compose.prod.yml"
      - "infra/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/hc-5514/maple-utility

jobs:
  build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./gradlew test

      - name: Build
        run: ./gradlew bootJar

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Export image tag
        id: image
        run: echo "image=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/maple-utility
          chmod 600 ~/.ssh/maple-utility
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Copy deployment files
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
        run: |
          ssh -i ~/.ssh/maple-utility "$EC2_USER@$EC2_HOST" "mkdir -p '$DEPLOY_DIR/infra/nginx' '$DEPLOY_DIR/infra/scripts'"
          scp -i ~/.ssh/maple-utility docker-compose.prod.yml "$EC2_USER@$EC2_HOST:$DEPLOY_DIR/docker-compose.prod.yml"
          scp -i ~/.ssh/maple-utility -r infra/nginx "$EC2_USER@$EC2_HOST:$DEPLOY_DIR/infra/"
          scp -i ~/.ssh/maple-utility -r infra/scripts "$EC2_USER@$EC2_HOST:$DEPLOY_DIR/infra/"

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          ssh -i ~/.ssh/maple-utility "$EC2_USER@$EC2_HOST" "\
            cd '$DEPLOY_DIR' && \
            echo '$GHCR_TOKEN' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin && \
            APP_IMAGE='$APP_IMAGE' docker compose -f docker-compose.prod.yml --env-file .env pull app && \
            APP_IMAGE='$APP_IMAGE' docker compose -f docker-compose.prod.yml --env-file .env up -d && \
            docker compose -f docker-compose.prod.yml --env-file .env ps && \
            curl -fsS http://localhost/health"
