name: PR 자동 라벨링

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const body  = context.payload.pull_request.body  || '';
            const labels = [];

            // 유형: PR 제목 → 없으면 본문 '변경 유형' 체크박스 fallback
            const typeMatch = title.match(/^(feat|fix|refactor|docs|chore|test|style)\b/i);
            if (typeMatch) {
              labels.push(typeMatch[1].toLowerCase());
            } else {
              const bodyTypeMatch = body.match(/- \[x\] .+\(`(feat|fix|refactor|docs|chore|test|style)`\)/i);
              if (bodyTypeMatch) labels.push(bodyTypeMatch[1].toLowerCase());
            }

            // 단계: 본문 체크박스 "- [x] Phase N"
            for (const m of body.matchAll(/- \[x\] Phase (\d)/gi)) {
              labels.push(`phase-${m[1]}`);
            }

            // 실행 도구: "- [x] Claude" / "- [x] Codex"
            if (body.match(/- \[x\] Claude/i)) labels.push('claude');
            if (body.match(/- \[x\] Codex/i))  labels.push('codex');

            // 우선순위: "- [x] P0 ..." / "- [x] P1 ..." / "- [x] P2 ..."
            const priorityMatch = body.match(/- \[x\] (P[012])/i);
            if (priorityMatch) labels.push(priorityMatch[1].toUpperCase());

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels,
              });
            }
