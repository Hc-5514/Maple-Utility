services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: maple-app
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - maple_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/maple
      SPRING_DATASOURCE_USERNAME: maple_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:?KAKAO_CLIENT_ID is required}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:?KAKAO_REDIRECT_URI is required}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:?KAKAO_CLIENT_SECRET is required}
      KAKAO_TOKEN_URI: ${KAKAO_TOKEN_URI:-https://kauth.kakao.com/oauth/token}
      KAKAO_USER_INFO_URI: ${KAKAO_USER_INFO_URI:-https://kapi.kakao.com/v2/user/me}
      NEXON_API_KEY_SECRET: ${NEXON_API_KEY_SECRET:?NEXON_API_KEY_SECRET is required}
      NEXON_CHARACTER_LIST_URI: ${NEXON_CHARACTER_LIST_URI:-https://open.api.nexon.com/maplestory/v1/character/list}
      NEXON_CHARACTER_BASIC_URI: ${NEXON_CHARACTER_BASIC_URI:-https://open.api.nexon.com/maplestory/v1/character/basic}
      NEXON_CHARACTER_SCHEDULER_URI: ${NEXON_CHARACTER_SCHEDULER_URI:-https://open.api.nexon.com/maplestory/v1/character/scheduler}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS is required}
      JAVA_TOOL_OPTIONS: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16.9-alpine
    container_name: maple-postgres
    restart: unless-stopped
    expose:
      - "5432"
    networks:
      - maple_internal
    environment:
      POSTGRES_DB: maple
      POSTGRES_USER: maple_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maple_user -d maple"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: maple-redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - maple_internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: maple-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    networks:
      - maple_internal
    depends_on:
      app:
        condition: service_healthy
    environment:
      SERVER_NAME: ${SERVER_NAME:?SERVER_NAME is required}
    command: >
      sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done &
      nginx -g "daemon off;"'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/templates:/etc/nginx/templates:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot:latest
    container_name: maple-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh
    command: >
      -c 'trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done;'

networks:
  maple_internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_webroot:
