spring:
  application:
    name: maple-utility
  jpa:
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl: 30m
  refresh-token-ttl: 7d

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}

nexon:
  api-key-secret: ${NEXON_API_KEY_SECRET}
  character-list-uri: ${NEXON_CHARACTER_LIST_URI:https://open.api.nexon.com/maplestory/v1/character/list}
  character-basic-uri: ${NEXON_CHARACTER_BASIC_URI:https://open.api.nexon.com/maplestory/v1/character/basic}
  character-scheduler-uri: ${NEXON_CHARACTER_SCHEDULER_URI:https://open.api.nexon.com/maplestory/v1/character/scheduler}
  daily-call-limit: 500
  realtime-call-threshold: 450
  dispatch-interval: 1s

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  redis:
    cache:
      scheduler-ttl: 5m
      character-basic-ttl: 1h
      static-data-ttl: 24h
      nexon-api-ttl: 5m
    refresh-token:
      ttl: 7d
