spring:
  application:
    name: maple-utility
  jpa:
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-token-ttl: 30m
  refresh-token-ttl: 7d

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
  nexon:
    client-id: ${NEXON_CLIENT_ID}
    client-secret: ${NEXON_CLIENT_SECRET}
    redirect-uri: ${NEXON_REDIRECT_URI}
    token-uri: ${NEXON_TOKEN_URI}
    user-info-uri: ${NEXON_USER_INFO_URI}

nexon:
  api-key-secret: ${NEXON_API_KEY_SECRET}

app:
  redis:
    cache:
      scheduler-ttl: 5m
      character-basic-ttl: 1h
      static-data-ttl: 24h
    refresh-token:
      ttl: 7d
